name: voip_audio_route_manager_macos
description: "macOS implementation of voip_audio_route_manager. Manages audio output routing and device discovery on macOS systems using native audio frameworks."
version: 1.1.0
homepage: https://github.com/NemiKardani/voip_audio_route_manager
repository: https://github.com/NemiKardani/voip_audio_route_manager/tree/main/voip_audio_route_manager_macos
topics:
  - voip
  - audio-routing
  - webrtc
  - audio
  - media

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  voip_audio_route_manager_platform_interface: ^1.1.0

dependency_overrides:
  voip_audio_route_manager_platform_interface:
    path: ../voip_audio_route_manager_platform_interface

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    implements: voip_audio_route_manager
    platforms:
      macos:
        pluginClass: FlutterVoipAudioRouteManagerMacosPlugin
        dartPluginClass: FlutterVoipAudioRouteManagerMacos

  # To add assets to your plugin package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
