name: voip_audio_route_manager_example
description: "Demonstrates how to use the voip_audio_route_manager plugin."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  voip_audio_route_manager:
    path: ../
  cupertino_icons: ^1.0.8

dependency_overrides:
  voip_audio_route_manager:
    path: ../
  voip_audio_route_manager_platform_interface:
    path: ../../voip_audio_route_manager_platform_interface
  voip_audio_route_manager_android:
    path: ../../voip_audio_route_manager_android
  voip_audio_route_manager_ios:
    path: ../../voip_audio_route_manager_ios
  voip_audio_route_manager_macos:
    path: ../../voip_audio_route_manager_macos
  voip_audio_route_manager_web:
    path: ../../voip_audio_route_manager_web

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
