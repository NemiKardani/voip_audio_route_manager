  voip_audio_route_manager_web: ^1.1.0
  # voip_audio_route_manager_web:
  #   path: ../voip_audio_route_manager_web

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  plugin_platform_interface: ^2.1.8







# --- Sibling Overrides (Auto-managed) ---
dependency_overrides:
