repository: https://github.com/NemiKardani/voip_audio_route_manager/tree/main/voip_audio_route_manager
environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Using 'any' makes version resolution dynamic and avoids manual bumping when platform packages update.













  # --- Sibling Dependencies (Auto-managed) ---
