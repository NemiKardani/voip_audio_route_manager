  voip_audio_route_manager_ios: ^1.1.3
  # voip_audio_route_manager_ios:
  #   path: ../voip_audio_route_manager_ios
  voip_audio_route_manager_macos: ^1.1.2
  # voip_audio_route_manager_macos:
