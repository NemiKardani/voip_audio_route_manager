name: voip_audio_route_manager
description: "VoIP Audio Route Manager: A production-ready Flutter package for advanced audio output device management and routing for VoIP communication applications."
version: 1.1.0
homepage: https://github.com/NemiKardani/voip_audio_route_manager
repository: https://github.com/NemiKardani/voip_audio_route_manager/tree/main/voip_audio_route_manager
topics:
  - voip
  - audio-routing
  - webrtc
  - audio
  - media

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Using 'any' makes version resolution dynamic and avoids manual bumping when platform packages update.
  voip_audio_route_manager_platform_interface: ^1.1.0
  voip_audio_route_manager_android: ^1.1.0
  voip_audio_route_manager_ios: ^1.1.0
  voip_audio_route_manager_macos: ^1.1.0
  voip_audio_route_manager_web: ^1.1.0

dependency_overrides:
  voip_audio_route_manager_platform_interface:
    path: ../voip_audio_route_manager_platform_interface
  voip_audio_route_manager_android:
    path: ../voip_audio_route_manager_android
  voip_audio_route_manager_ios:
    path: ../voip_audio_route_manager_ios
  voip_audio_route_manager_macos:
    path: ../voip_audio_route_manager_macos
  voip_audio_route_manager_web:
    path: ../voip_audio_route_manager_web

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  plugin_platform_interface: ^2.1.8

flutter:
  plugin:
    platforms:
      android:
        default_package: voip_audio_route_manager_android
      ios:
        default_package: voip_audio_route_manager_ios
      macos:
        default_package: voip_audio_route_manager_macos
      web:
        default_package: voip_audio_route_manager_web
