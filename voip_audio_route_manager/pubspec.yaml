name: voip_audio_route_manager
description: "VoIP Audio Route Manager: A production-ready Flutter package for advanced audio output device management and routing for VoIP communication applications."
version: 1.0.0
homepage: https://github.com/NemiKardani/voip_audio_route_manager
repository: https://github.com/NemiKardani/voip_audio_route_manager/tree/main/voip_audio_route_manager/voip_audio_route_manager

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  voip_audio_route_manager_platform_interface:
    path: ../voip_audio_route_manager_platform_interface
  voip_audio_route_manager_android:
    path: ../voip_audio_route_manager_android
  voip_audio_route_manager_ios:
    path: ../voip_audio_route_manager_ios
  voip_audio_route_manager_macos:
    path: ../voip_audio_route_manager_macos
  voip_audio_route_manager_web:
    path: ../voip_audio_route_manager_web

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  plugin_platform_interface: ^2.1.8

flutter:
  plugin:
    platforms:
      android:
        default_package: voip_audio_route_manager_android
      ios:
        default_package: voip_audio_route_manager_ios
      macos:
        default_package: voip_audio_route_manager_macos
      web:
        default_package: voip_audio_route_manager_web

  # To add assets to your plugin package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
