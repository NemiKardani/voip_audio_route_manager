name: CI Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sanity-checks:
    name: Check ${{ matrix.package-name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-name: 'voip_audio_route_manager'
            path: 'voip_audio_route_manager'
          - package-name: 'voip_audio_route_manager_android'
            path: 'voip_audio_route_manager_android'
          - package-name: 'voip_audio_route_manager_ios'
            path: 'voip_audio_route_manager_ios'
          - package-name: 'voip_audio_route_manager_macos'
            path: 'voip_audio_route_manager_macos'
          - package-name: 'voip_audio_route_manager_platform_interface'
            path: 'voip_audio_route_manager_platform_interface'
          - package-name: 'voip_audio_route_manager_web'
            path: 'voip_audio_route_manager_web'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: ./.github/actions/setup-env

      - name: Get dependencies
        working-directory: ${{ matrix.path }}
        run: flutter pub get

      - name: Verify Formatting
        working-directory: ${{ matrix.path }}
        run: dart format --output=none --set-exit-if-changed .

      - name: Run Static Analysis
        working-directory: ${{ matrix.path }}
        run: flutter analyze

      - name: Run Unit & Widget Tests
        working-directory: ${{ matrix.path }}
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No test/ directory found. Skipping tests."
          fi

      - name: Pub.dev Publish Dry-Run
        working-directory: ${{ matrix.path }}
        run: flutter pub publish --dry-run
        continue-on-error: true


  lint-format-and-test:
    name: Lint, Format, and Test
    needs: sanity-checks
    runs-on: ubuntu-latest
    steps:
      - name: Confirm Sanity Checks Completed
        run: echo "All parallel package sanity checks passed. Lint, Format, and Test completed!"
