name: Verify Code and AI Review

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    name: Lint, Format, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies across all packages
        run: |
          for dir in voip_audio_route_manager_platform_interface voip_audio_route_manager_android voip_audio_route_manager_ios voip_audio_route_manager_macos voip_audio_route_manager_web voip_audio_route_manager; do
            echo "=== Getting dependencies in $dir ==="
            (cd $dir && flutter pub get)
          done

      - name: Verify Formatting
        run: |
          for dir in voip_audio_route_manager_platform_interface voip_audio_route_manager_android voip_audio_route_manager_ios voip_audio_route_manager_macos voip_audio_route_manager_web voip_audio_route_manager; do
            echo "=== Checking formatting in $dir ==="
            (cd $dir && dart format --output=none --set-exit-if-changed .)
          done

      - name: Run Static Analysis
        run: |
          for dir in voip_audio_route_manager_platform_interface voip_audio_route_manager_android voip_audio_route_manager_ios voip_audio_route_manager_macos voip_audio_route_manager_web voip_audio_route_manager; do
            echo "=== Analyzing $dir ==="
            (cd $dir && flutter analyze)
          done

      - name: Run Unit Tests
        run: |
          cd voip_audio_route_manager && flutter test

  gemini-review:
    name: Gemini AI Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/main...HEAD > changes.diff
          else
            git diff HEAD~1 > changes.diff
          fi
        continue-on-error: true

      - name: Run Gemini AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -s changes.diff ] && [ ! -z "$GEMINI_API_KEY" ]; then
            node scripts/gemini_review.js changes.diff
          else
            echo "Skipping review: either diff is empty or GEMINI_API_KEY is not configured."
            echo "### Gemini Review skipped (no changes or missing API key)" > gemini_review.md
          fi

      - name: Comment PR with Review
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: gemini-code-review
          path: gemini_review.md
