name: 'Setup Environment'
description: 'Sets up Java, Flutter, and caches Dart dependencies'
inputs:
  java-version:
    description: 'Java version to set up'
    required: false
    default: '21'
  flutter-channel:
    description: 'Flutter channel to set up'
    required: false
    default: 'stable'

runs:
  using: 'composite'
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: ${{ inputs.java-version }}

    - name: Cache Pub Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: ${{ inputs.flutter-channel }}
        cache: true
