name: 'Setup Environment'
description: 'Sets up Java and Flutter without caching'
inputs:
  java-version:
    description: 'Java version to set up'
    required: false
    default: '21'

runs:
  using: 'composite'
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: ${{ inputs.java-version }}

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version-file: '.fvmrc'
        cache: false
